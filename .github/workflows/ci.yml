name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: app

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        # TODO: remove continue-on-error once the existing codebase has been
        # reformatted with `dart format .` — tracked as a follow-up cleanup.
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        # --no-fatal-infos: don't fail the build on info-level lints (e.g.
        # minor deprecation notices) — warnings and errors still fail the job.
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
