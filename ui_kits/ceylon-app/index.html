<!-- @startingPoint section="Mobile App" subtitle="Ceylon Review — full 7-screen Flutter prototype with dynamic category theming" viewport="375x812" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceylon Review — UI Kit Prototype</title>

  <!-- Google Fonts: Bricolage Grotesque + Plus Jakarta Sans + Material Symbols Rounded -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <!-- Design system tokens -->
  <link rel="stylesheet" href="../../styles.css" />
  <!-- UI kit styles -->
  <link rel="stylesheet" href="./app.css" />

  <style>
    #root { display: contents; }

    /* Ensure phone sits nicely vertically on taller viewports */
    @media (max-height: 900px) {
      body { align-items: flex-start; padding-top: 32px; }
    }

    /* Horizontal scroll if viewport too narrow for phone + panel */
    @media (max-width: 700px) {
      body { flex-direction: column; align-items: center; }
      .controls { flex-direction: row; flex-wrap: wrap; gap: 16px; width: 375px; }
    }
  </style>

  <!-- React + ReactDOM (pinned, integrity-hashed) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <!-- Babel standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 1. Shared data (plain JS — no Babel) -->
  <script src="./shared/data.js"></script>

  <!-- 2. Shared components (Babel JSX — exports to window.*) -->
  <script type="text/babel" src="./shared/components.jsx"></script>

  <!-- 3. Screens (Babel JSX — each exports its component to window.*) -->
  <script type="text/babel" src="./screens/LoginScreen.jsx"></script>
  <script type="text/babel" src="./screens/HomeScreen.jsx"></script>
  <script type="text/babel" src="./screens/CategoryScreen.jsx"></script>
  <script type="text/babel" src="./screens/PlaceDetailScreen.jsx"></script>
  <script type="text/babel" src="./screens/WriteReviewScreen.jsx"></script>
  <script type="text/babel" src="./screens/ProfileScreen.jsx"></script>
  <script type="text/babel" src="./screens/MapScreen.jsx"></script>

  <!-- 4. App root — mounts after all components are registered -->
  <script type="text/babel" src="./App.jsx"></script>
</body>
</html>
